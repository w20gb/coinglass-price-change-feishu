name: Coinglass Price Monitor

on:
  # schedule:
  #   - cron: '*/5 * * * *'  # 每5分钟运行一次 (注意：实际可能延迟)
  workflow_dispatch:      # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许回写 history_data.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Monitor Script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py

      - name: Commit and Push History
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add history_data.json
          # 仅当有变化时才提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update price history [skip ci]" && git push)
